<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RestabledSMP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

/* Header */

header{
padding:40px 20px;
background:linear-gradient(135deg,#6366f1,#4f46e5);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

header h1{
font-size:40px;
letter-spacing:2px;
}

/* Container */

.container{
max-width:1100px;
margin:auto;
padding:30px 20px;
}

/* Server Card */

.server-card{
background:#1e293b;
border-radius:15px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
margin-bottom:40px;
transition:0.3s;
}

.server-card:hover{
transform:translateY(-5px);
}

/* Status */

.status{
font-size:18px;
margin-top:10px;
}

.players{
margin-top:5px;
opacity:0.8;
}

/* Icon */

.server-icon{
width:150px;
border-radius:10px;
margin-bottom:10px;
}

/* Sections */

.sections{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.section{
background:#111827;
padding:20px;
border-radius:10px;
}

/* Buttons */

.button{
display:inline-block;
margin-top:20px;
padding:12px 28px;
background:#5865F2;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:600;
transition:0.25s;
}

.button:hover{
background:#4752C4;
transform:scale(1.05);
}

/* Screenshots */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.gallery img{
width:100%;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* Footer */

footer{
margin-top:40px;
padding:20px;
background:#020617;
opacity:0.7;
font-size:14px;
}

/* Mobile */

@media(max-width:700px){
.sections{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<header>
<h1>RestabledSMP</h1>
<p>Minecraft Survival Server</p>
</header>

<div class="container">

<div class="server-card">

<img class="server-icon" src="https://api.mcsrvstat.us/icon/157.180.106.62:23731">

<div id="status" class="status">Checking server...</div>
<div id="players" class="players"></div>

<div class="sections">

<div class="section">
<h2>Java Edition</h2>
<p><b>IP:</b> restabledsmpp.falix.me</p>
<p><b>Port:</b> 23731</p>
<p>Cracked: Enabled</p>
</div>

<div class="section">
<h2>Bedrock Edition</h2>
<p><b>IP:</b> restabledsmpp.falix.me</p>
<p><b>Port:</b> 20047</p>
</div>

</div>

<a class="button" href="https://discord.gg/xvejbvuTh7">Join our Discord</a>

</div>

<h2>Screenshots</h2>

<div class="gallery">
<img src="screenshot1.png">
<img src="screenshot2.png">
<img src="screenshot3.png">
</div>

</div>

<footer>
RestabledSMP • Minecraft Server
</footer>

<script>

fetch("https://api.mcsrvstat.us/2/157.180.106.62:23731")
.then(res => res.json())
.then(data => {

if(data.online){

document.getElementById("status").innerHTML =
"🟢 Server Online";

document.getElementById("players").innerHTML =
"Players: " + data.players.online + " / " + data.players.max;

}else{

document.getElementById("status").innerHTML =
"🔴 Server Offline";

}

})
.catch(()=>{
document.getElementById("status").innerHTML="⚠️ Could not check server";
});

</script>

</body>
</html>
